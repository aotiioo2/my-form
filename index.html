<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>แบบฟอร์มข่าว</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Prompt', sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      padding: 20px;
      width: 90%;
      max-width: 800px;
      animation: fadeIn 0.6s ease;
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
      color: #333;
    }

    p {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
    }

    iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 12px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile */
    @media (max-width: 600px) {
      iframe {
        height: 600px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>📰 ฟอร์มส่งข่าว</h2>
    <p>กรุณากรอกข้อมูลให้ครบถ้วน</p>

    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSew7Czvrw4gunR2czCYo3MPp__6IlutzRfpZbW2VzGxvjh0iQ/viewform?embedded=true">
      กำลังโหลด…
    </iframe>
  </div>

</body>
</html>
